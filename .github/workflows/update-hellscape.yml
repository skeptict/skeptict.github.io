name: Update Hellscape Data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am UTC
  workflow_dispatch:       # Also triggerable manually from GitHub Actions UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml requests

      - name: Fetch fresh article links
        run: python .github/scripts/update_hellscape.py

      - name: Commit and push if changed
        run: |
          git config user.name "hellscape-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/hellscape.yml
          git diff --staged --quiet || (
            git commit -m "auto: refresh hellscape articles [$(date +%Y-%m-%d)]" &&
            git push
          )
